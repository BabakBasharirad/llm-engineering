# Site settings
course_name: Large Language Model (LLM) Engineering
course_description: "This minor addresses the growing professional need for engineers who can design, implement, and responsibly deploy Large Language Models (LLMs). 
Students develop competencies in natural language processing, software engineering, and ethical AI while working on current challenges such as retrieval-augmented generation, 
fine-tuning, and deployment. Professional products include coding assignments, ethical case analyses, and a capstone industry project, where students apply their knowledge 
to create innovative, production-ready AI solutions."
